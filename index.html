<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kristopher Pearcey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #191919;
      --surface: #f9f9f9;
      --text: #f2f2ef;
      --muted: #808086;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.11);
      --cta-bg: #f9f9f9;
      --cta-text: #191919;
      --hero-overlay: linear-gradient(180deg, rgba(8,8,10,0.10), rgba(8,8,10,0.42));
      --content-width: 642px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --fast: 180ms;
      --medium: 260ms;
    }

    body.light {
      --bg: #f6f6f3;
      --surface: #191919;
      --text: #1a1a1a;
      --muted: #76767b;
      --line: rgba(0,0,0,0.085);
      --line-strong: rgba(0,0,0,0.13);
      --cta-bg: #191919;
      --cta-text: #f9f9f9;
      --hero-overlay: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.28));
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    html, body { overflow: hidden; }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background var(--medium) var(--ease), color var(--medium) var(--ease);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 16px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
    }

    .view-toggle .material-symbols-outlined.flip-horizontal {
      transform: scaleX(-1);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 38px;
      background: var(--cta-bg);
      color: var(--cta-text);
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background var(--medium) var(--ease), color var(--medium) var(--ease);
    }

    body.light .topbar {
      border-bottom-color: rgba(255,255,255,0.05);
    }

    .topbar__inner {
      max-width: 1240px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
    }

    .topbar__cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
      white-space: nowrap;
    }

    .topbar__cta svg {
      width: 13px;
      height: 13px;
    }

    .topbar__cta:hover {
      opacity: 0.9;
      text-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    body.light .topbar__cta:hover {
      text-shadow: 0 0 10px rgba(255,255,255,0.06);
    }

    .page {
      height: calc(100vh - 38px);
      padding-top: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
    }

    .page::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .shell {
      width: min(var(--content-width), calc(100vw - 48px));
      margin: 0 auto;
      padding-top: 0;
      padding-bottom: 84px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0;
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 60px;
      padding: 0;
      box-sizing: border-box;
      background: color-mix(in srgb, var(--bg) 38%, transparent);
      isolation: isolate;
    }

    .nav::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 20px;
      pointer-events: none;
      background: linear-gradient(to bottom, color-mix(in srgb, var(--bg) 16%, transparent) 0%, transparent 100%);
    }

    .brand {
      font-size: 16px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.035em;
      color: var(--muted);
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
      flex: 0 0 auto;
      max-width: 42vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand:hover {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.05);
    }

    body.light .brand:hover {
      text-shadow: 0 0 10px rgba(25,25,25,0.04);
    }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav__link,
    .mode-toggle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
    }

    .nav__link:hover,
    .mode-toggle:hover,
    .nav__link.is-active {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.06);
    }

    body.light .nav__link:hover,
    body.light .mode-toggle:hover,
    body.light .nav__link.is-active {
      text-shadow: 0 0 10px rgba(25,25,25,0.05);
    }

    .mode-toggle {
      width: 16px;
      height: 16px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 2px;
      flex: 0 0 auto;
    }

    .mode-toggle svg {
      position: absolute;
      width: 14px;
      height: 14px;
      transition: opacity var(--medium) var(--ease), transform var(--medium) var(--ease);
    }

    .mode-toggle .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .mode-toggle .moon { opacity: 0; transform: rotate(25deg) scale(0.82); }
    body.light .mode-toggle .sun { opacity: 0; transform: rotate(-25deg) scale(0.82); }
    body.light .mode-toggle .moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .hero {
      position: relative;
      height: 246px;
      margin: 0 0 26px;
      overflow: hidden;
      border-radius: 2px;
    }

    .hero__media,
    .hero__media::after,
    .hero__image {
      position: absolute;
      inset: 0;
    }

    .hero__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--bg);
      filter: saturate(0.9) contrast(0.98) brightness(0.84);
    }

    body.light .hero__image {
      filter: saturate(0.92) contrast(0.98) brightness(1.03);
    }

    .hero__media::after {
      content: "";
      background: var(--hero-overlay);
    }

    .hero__content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 0;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(31px, 4vw, 44px);
      line-height: 0.96;
      letter-spacing: -0.066em;
      font-weight: 800;
      color: #f3f3f2;
      max-width: 8.7ch;
      text-wrap: balance;
      text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }

    body.light .hero h1 {
      color: #0f1012;
      text-shadow: none;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
      flex: 1 1 auto;
      max-width: 210px;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 0;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 28px;
      padding: 0 22px 0 28px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .search input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .search input[type="search"]::-webkit-search-decoration,
    .search input[type="search"]::-webkit-search-results-button,
    .search input[type="search"]::-webkit-search-results-decoration {
      display: none;
    }

    .search input[type="search"]::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      margin-left: 8px;
      cursor: pointer;
      background-color: var(--muted);
      opacity: 1;
      -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.7' stroke-linecap='round'><path d='M4 4l8 8'/><path d='M12 4L4 12'/></svg>");
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: 14px 14px;
      mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.7' stroke-linecap='round'><path d='M4 4l8 8'/><path d='M12 4L4 12'/></svg>");
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: 14px 14px;
    }

    .search input[type="search"]::-webkit-search-cancel-button:hover {
      background-color: var(--text);
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .view-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 0;
      padding: 0;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
    }

    .view-toggle button:hover,
    .view-toggle button.is-active {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.06);
    }

    body.light .view-toggle button:hover,
    body.light .view-toggle button.is-active {
      text-shadow: 0 0 10px rgba(25,25,25,0.05);
    }

    .view-toggle svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .view-toggle .material-symbols-outlined {
      font-size: 16px;
    }

    .posts {
      display: grid;
      gap: 0;
    }

    .posts.view-cards .post {
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 14px 0 12px;
    }

    .posts.view-cards .post + .post {
      padding-top: 20px;
    }

    .posts.view-rows .post {
      cursor: pointer;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 72px;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }

    .posts.view-rows .post:first-child {
      border-top: 0;
    }

    .post__icon,
    .contact-item__icon {
      width: 34px;
      height: 48px;
      border-radius: 1px;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .post__icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .post__icon-fallback {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .post__icon-fallback svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .post__icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .post__title {
      margin: 0;
      color: var(--text);
      letter-spacing: -0.035em;
      transition: opacity var(--fast) var(--ease);
    }

    .posts.view-cards .post__title {
      font-size: 17px;
      line-height: 1.18;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .posts.view-cards .post > div:nth-child(2) {
      min-height: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .posts.view-rows .post__title {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
    }

    .post:hover .post__title { opacity: 0.92; }

    .post:hover .post__meta,
    .post:hover .post__excerpt,
    .post:hover .post__year,
    .post:hover .post__pages {
      color: var(--text);
    }

    .post__meta {
      color: var(--muted);
      letter-spacing: -0.02em;
    }

    .posts.view-cards .post__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
    }

    .posts.view-rows .post__meta {
      display: contents;
    }

    .post__year,
    .post__pages {
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: -0.02em;
    }

    .post__year { justify-self: start; }
    .post__pages {
      justify-self: end;
      text-align: right;
      white-space: nowrap;
    }

    .post__excerpt {
      margin: 0;
      color: var(--muted);
      letter-spacing: -0.02em;
    }

    .posts.view-cards .post__excerpt {
      font-size: 15px;
      line-height: 1.72;
      max-width: none;
      margin: 0;
      grid-column: 1 / -1;
      padding: 0;
    }

    .posts.view-rows .post__excerpt,
    .posts.view-rows .post__icon,
    .posts.view-rows .post__metaDot,
    .posts.view-rows .post__author,
    .posts.view-rows .post__formattedDate,
    .posts.view-rows .post__monthYear,
    .posts.view-rows .post__shortdate {
      display: none;
    }

    .empty {
      display: none;
      padding-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: -0.02em;
    }

    .empty.is-visible { display: block; }

    .plain-block {
      color: #88888d;
      font-size: 15px;
      line-height: 1.72;
      letter-spacing: -0.02em;
    }

    .plain-block strong {
      display: block;
      margin-top: 10px;
      margin-bottom: 22px;
      font-size: 17px;
      line-height: 1.18;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.035em;
    }

    .md-content {
      color: var(--text);
      font-size: 15px;
      line-height: 1.78;
      letter-spacing: -0.02em;
    }

    .md-content > :first-child {
      margin-top: 10px;
    }

    .md-content h1,
    .md-content h2,
    .md-content h3 {
      color: #f3f3f1;
      letter-spacing: -0.04em;
      line-height: 1.08;
      margin: 0 0 16px;
      font-weight: 700;
    }

    body.light .md-content h1,
    body.light .md-content h2,
    body.light .md-content h3 {
      color: #111214;
    }

    .md-content h1 { font-size: 30px; }
    .md-content h2 { font-size: 24px; margin-top: 32px; }
    .md-content h3 { font-size: 20px; margin-top: 26px; }

    .md-content p,
    .md-content ul,
    .md-content ol,
    .md-content blockquote {
      margin: 0 0 18px;
      color: #88888d;
    }

    body.light .md-content p,
    body.light .md-content ul,
    body.light .md-content ol,
    body.light .md-content blockquote {
      color: #6f6f74;
    }

    .md-content a {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .md-content blockquote {
      margin-left: 0;
      padding-left: 14px;
      border-left: 1px solid var(--line);
    }

    .md-content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 20px 0;
    }

    .contact-list {
      display: grid;
      gap: 0;
    }

    .contact-item {
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 14px 0 12px;
    }

    .contact-item + .contact-item {
      padding-top: 20px;
    }

    .contact-item__main {
      min-height: 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-item__title {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.035em;
      color: var(--text);
      transition: opacity var(--fast) var(--ease);
    }

    .contact-item__title a {
      color: inherit;
      text-decoration: none;
    }

    .contact-item__meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .contact-item__excerpt {
      margin: 0;
      font-size: 15px;
      line-height: 1.72;
      color: var(--muted);
      letter-spacing: -0.02em;
      grid-column: 1 / -1;
    }

    .contact-item:hover .contact-item__title { opacity: 0.92; }

    .contact-item:hover .contact-item__meta,
    .contact-item:hover .contact-item__excerpt {
      color: var(--text);
    }

    @media (max-width: 720px) {
      :root { --content-width: 642px; }

      .shell {
        width: min(var(--content-width), calc(100vw - 28px));
        padding-top: 0;
      }

      .nav {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 64px;
      }

      .nav__links {
        gap: 16px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        min-width: 0;
      }

      .nav__link,
      .mode-toggle {
        font-size: 15px;
      }

      .mode-toggle {
        width: 18px;
        height: 18px;
        margin-left: 4px;
      }

      .mode-toggle svg {
        width: 16px;
        height: 16px;
      }

      .hero {
        height: 196px;
        margin-bottom: 22px;
      }

      .hero h1 {
        font-size: 30px;
        max-width: 8.9ch;
      }

      .controls {
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }

      .search {
        max-width: none;
        flex: 1 1 auto;
      }

      .search input {
        height: 32px;
        font-size: 16px;
        padding: 0 24px 0 30px;
      }

      .search svg {
        width: 17px;
        height: 17px;
      }

      .view-toggle {
        gap: 16px;
      }

      .view-toggle button {
        width: 20px;
        height: 20px;
      }

      .view-toggle svg {
        width: 18px;
        height: 18px;
      }

      .view-toggle .material-symbols-outlined {
        font-size: 19px;
      }

      .posts.view-rows .post {
        grid-template-columns: 42px minmax(0, 1fr) 62px;
      }

      .brand {
        max-width: 34vw;
      }
    }

    @media (max-width: 520px) {
      .topbar__cta { font-size: 11px; }
      .shell { width: calc(100vw - 22px); }

      .nav {
        gap: 10px;
        min-height: 62px;
      }

      .brand {
        font-size: 17px;
        max-width: 32vw;
      }

      .nav__links {
        gap: 14px;
      }

      .nav__link,
      .mode-toggle {
        font-size: 15px;
      }

      .mode-toggle {
        width: 18px;
        height: 18px;
      }

      .mode-toggle svg {
        width: 16px;
        height: 16px;
      }

      .controls {
        gap: 14px;
      }

      .search {
        max-width: none;
      }

      .view-toggle {
        gap: 14px;
      }

      .view-toggle button {
        width: 20px;
        height: 20px;
      }

      .posts.view-cards .post {
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        padding: 14px 0 20px;
      }

      .post__icon,
      .contact-item__icon {
        width: 34px;
        height: 48px;
      }

      .post__icon svg {
        width: 16px;
        height: 16px;
      }

      .posts.view-cards .post__title,
      .posts.view-rows .post__title,
      .contact-item__title {
        font-size: 15px;
      }

      .posts.view-cards .post__excerpt,
      .contact-item__excerpt {
        font-size: 14px;
      }

      .posts.view-rows .post {
        grid-template-columns: 40px minmax(0, 1fr) 58px;
        gap: 8px;
      }

      .post__pages {
        font-size: 12px;
      }
    }

    @media (hover: none), (pointer: coarse) {
      .topbar__cta,
      .brand,
      .nav__link,
      .mode-toggle,
      .view-toggle button,
      .post,
      .post__title,
      .contact-item,
      .contact-item__title,
      .contact-item__meta,
      .contact-item__excerpt,
      .post__meta,
      .post__excerpt,
      .post__year,
      .post__pages {
        -webkit-tap-highlight-color: transparent;
        tap-highlight-color: transparent;
        text-shadow: none !important;
        user-select: none;
      }

      .topbar__cta:hover,
      .topbar__cta:active,
      .brand:hover,
      .brand:active,
      .nav__link:hover,
      .nav__link:active,
      .mode-toggle:hover,
      .mode-toggle:active,
      .view-toggle button:hover,
      .view-toggle button:active,
      .post:hover .post__title,
      .post:active .post__title,
      .post:hover .post__meta,
      .post:active .post__meta,
      .post:hover .post__excerpt,
      .post:active .post__excerpt,
      .post:hover .post__year,
      .post:active .post__year,
      .post:hover .post__pages,
      .post:active .post__pages,
      .contact-item:hover .contact-item__title,
      .contact-item:active .contact-item__title,
      .contact-item:hover .contact-item__meta,
      .contact-item:active .contact-item__meta,
      .contact-item:hover .contact-item__excerpt,
      .contact-item:active .contact-item__excerpt {
        color: inherit !important;
        opacity: inherit !important;
        text-shadow: none !important;
        background: transparent !important;
      }

      .search input,
      .search input[type="search"] {
        font-size: 16px;
      }

      .search input[type="search"]::-webkit-search-cancel-button:hover {
        background-color: var(--muted);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar__inner">
      <a href="#newsletter" class="topbar__cta" aria-label="Join the newsletter">
        <span>Join the Newsletter — Get Notified for New Content</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="m13 5 7 7-7 7"></path>
        </svg>
      </a>
    </div>
  </div>

  <div class="page" id="pageRoot">
    <div id="home"></div>
    <main class="shell">
      <header class="nav">
        <a href="#home" class="brand" id="brandHome" aria-label="KP home">KP</a>
        <nav class="nav__links" aria-label="Primary navigation">
          <a class="nav__link is-active" href="#home">Home</a>
          <a class="nav__link" href="#about" data-section="about">About</a>
          <a class="nav__link" href="#contact" data-section="contact">Contact</a>
          <button class="mode-toggle" id="modeToggle" type="button" aria-label="Toggle light and dark mode">
            <svg class="moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"></path>
            </svg>
            <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </nav>
      </header>

      <section class="hero" aria-label="Hero section">
        <div class="hero__media">
          <img class="hero__image" src="author.png" alt="Author portrait" />
        </div>
        <div class="hero__content">
          <h1>Short Horror from Atlantic Canada.</h1>
        </div>
      </section>

      <section class="controls" aria-label="Search and list controls">
        <label class="search" aria-label="Search titles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Search..." autocomplete="off" />
        </label>

        <div class="view-toggle" aria-label="Change list layout">
          <button id="cardsViewBtn" class="is-active" type="button" aria-label="Expanded story list view">
            <span class="material-symbols-outlined flip-horizontal" aria-hidden="true">event_list</span>
          </button>
          <button id="rowsViewBtn" type="button" aria-label="Single line story list view">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M2 3.25H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2 8H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2 12.75H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </section>

      <section id="dynamicSection" class="plain-block" style="display:none; margin-bottom: 18px;" aria-live="polite"></section>

      <section id="storiesSection" aria-label="Stories list">
        <div id="posts" class="posts view-cards"></div>
        <div id="emptyState" class="empty">No titles matched your search.</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const postsData = [
      {
        title: 'Quiet Places',
        author: 'Kristopher Pearcey',
        date: '2026-03-14',
        monthYear: 'Mar 2026',
        year: '2026',
        pages: 31,
        excerpt: 'A novel-length descent into familiar places that become strange the longer anyone looks at them.',
        icon: 'document'
      },
      {
        title: 'The Long Hall',
        author: 'Kristopher Pearcey',
        date: '2026-02-22',
        monthYear: 'Feb 2026',
        year: '2026',
        pages: 18,
        excerpt: 'A corridor keeps extending in the corner of a family home, always just past where anyone remembers it ending.',
        icon: 'lines'
      },
      {
        title: 'Salt House',
        author: 'Kristopher Pearcey',
        date: '2026-01-30',
        monthYear: 'Jan 2026',
        year: '2026',
        pages: 14,
        excerpt: 'Wind, timber, and the sea begin answering each other after a winter power outage on the coast.',
        icon: 'grid'
      },
      {
        title: 'The Visitor Log',
        author: 'Kristopher Pearcey',
        date: '2025-12-18',
        monthYear: 'Dec 2025',
        year: '2025',
        pages: 11,
        excerpt: 'The names in a museum sign-in book start appearing before the visitors themselves do.',
        icon: 'stack'
      },
      {
        title: 'Blue Hour',
        author: 'Kristopher Pearcey',
        date: '2025-11-09',
        monthYear: 'Nov 2025',
        year: '2025',
        pages: 9,
        excerpt: 'A commuter sees the same bus stop at every turn of the road, no matter which route she takes home.',
        icon: 'document'
      }
    ].sort((a, b) => new Date(b.date) - new Date(a.date));

    const postsEl = document.getElementById('posts');
    const emptyStateEl = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const cardsViewBtn = document.getElementById('cardsViewBtn');
    const rowsViewBtn = document.getElementById('rowsViewBtn');
    const modeToggle = document.getElementById('modeToggle');
    const dynamicSection = document.getElementById('dynamicSection');
    const storiesSection = document.getElementById('storiesSection');
    const controlsSection = document.querySelector('.controls');
    const sectionLinks = document.querySelectorAll('[data-section]');
    const brandHome = document.getElementById('brandHome');
    const homeAnchor = document.getElementById('home');
    const pageEl = document.querySelector('.page');
    const homeLink = document.querySelector('.nav__link[href="#home"]');

    let currentStoryTitle = '';
    let brandScrollHandler = null;

    function getIconMarkup(type) {
      const icons = {
        document: `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 3.75h7l4 4v12.5a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4.75a1 1 0 0 1 1-1Z"></path>
            <path d="M14 3.75v4h4"></path>
            <path d="M9 12h6M9 16h6"></path>
          </svg>`,
        lines: `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
            <path d="M6 7h12"></path>
            <path d="M6 12h8"></path>
            <path d="M6 17h10"></path>
          </svg>`,
        grid: `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
            <rect x="4.5" y="4.5" width="5.5" height="5.5" rx="1"></rect>
            <rect x="14" y="4.5" width="5.5" height="5.5" rx="1"></rect>
            <rect x="4.5" y="14" width="5.5" height="5.5" rx="1"></rect>
            <rect x="14" y="14" width="5.5" height="5.5" rx="1"></rect>
          </svg>`,
        stack: `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 4.5 4.5 8.5 12 12.5l7.5-4-7.5-4Z"></path>
            <path d="M4.5 12.5 12 16.5l7.5-4"></path>
            <path d="M4.5 16.5 12 20.5l7.5-4"></path>
          </svg>`
      };
      return icons[type] || icons.document;
    }

    function slugify(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function getStoryVisual(post, slug) {
      const fallback = getIconMarkup(post.icon);
      return `
        <img
          src="img/${slug}.jpg"
          alt="${post.title} cover"
          onerror="this.style.display='none'; if(this.nextElementSibling) this.nextElementSibling.style.display='inline-flex';"
        />
        <span class="post__icon-fallback">${fallback}</span>
      `;
    }

    function setBrandText(text = 'KP') {
      brandHome.textContent = text;
      brandHome.setAttribute('aria-label', `${text} home`);
    }

    function clearBrandScrollWatcher() {
      if (brandScrollHandler) {
        pageEl.removeEventListener('scroll', brandScrollHandler);
        brandScrollHandler = null;
      }
    }

    function setupStoryBrandWatcher() {
      clearBrandScrollWatcher();

      const storyHeading = dynamicSection.querySelector('.md-content h1');
      if (!storyHeading || !currentStoryTitle) {
        setBrandText('KP');
        return;
      }

      const updateBrand = () => {
        const headingTop = storyHeading.getBoundingClientRect().top;
        const navBottom = document.querySelector('.nav').getBoundingClientRect().bottom;
        if (headingTop <= navBottom) {
          setBrandText(currentStoryTitle);
        } else {
          setBrandText('KP');
        }
      };

      brandScrollHandler = updateBrand;
      pageEl.addEventListener('scroll', brandScrollHandler, { passive: true });
      updateBrand();
    }

    function bindPostEvents() {
      document.querySelectorAll('.post').forEach((el) => {
        const open = () => loadStory(el.dataset.slug, el.dataset.file, true);
        el.addEventListener('click', open);
        el.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            open();
          }
        });
      });
    }

    function renderPosts(items) {
      const isRows = postsEl.classList.contains('view-rows');

      postsEl.innerHTML = items.map((post) => {
        const slug = slugify(post.title);
        const file = `stories/${slug}.md`;
        const visual = getStoryVisual(post, slug);

        if (isRows) {
          return `
            <article class="post" data-slug="${slug}" data-file="${file}" role="button" tabindex="0">
              <div class="post__year">${post.year}</div>
              <h2 class="post__title">${post.title}</h2>
              <div class="post__pages">${post.pages} pages</div>
              <div class="post__icon">${visual}</div>
              <div class="post__meta">
                <span class="post__author">${post.author}</span>
                <span class="post__metaDot">•</span>
                <span class="post__formattedDate">${post.monthYear}</span>
              </div>
              <p class="post__excerpt">${post.excerpt}</p>
            </article>
          `;
        }

        return `
          <article class="post" data-slug="${slug}" data-file="${file}" role="button" tabindex="0">
            <div class="post__icon">${visual}</div>
            <div>
              <h2 class="post__title">${post.title}</h2>
              <div class="post__meta">
                <span>${post.author}</span>
                <span class="post__metaDot">•</span>
                <span class="post__monthYear">${post.monthYear}</span>
                <span class="post__metaDot">•</span>
                <span>${post.pages} pages</span>
              </div>
            </div>
            <p class="post__excerpt">${post.excerpt}</p>
          </article>
        `;
      }).join('');

      bindPostEvents();
      emptyStateEl.classList.toggle('is-visible', items.length === 0);
    }

    function getFilteredPosts() {
      const query = searchInput.value.trim().toLowerCase();
      return postsData.filter(post => post.title.toLowerCase().includes(query));
    }

    function refreshPosts() {
      renderPosts(getFilteredPosts());
    }

    const sectionContent = {
      about: {
        title: 'About',
        showTitle: true,
        body: `<p>Kristopher Pearcey writes atmospheric horror from Atlantic Canada, drawn to liminal spaces, coastal unease, and the kinds of places that feel wrong before they look wrong.</p>`
      },
      contact: {
        title: 'Contact',
        showTitle: false,
        body: `
          <div class="contact-list">
            <article class="contact-item">
              <div class="contact-item__icon"><i class="fa-regular fa-envelope"></i></div>
              <div class="contact-item__main">
                <h3 class="contact-item__title"><a href="mailto:hello@example.com">Contact</a></h3>
                <div class="contact-item__meta">hello@example.com</div>
              </div>
              <p class="contact-item__excerpt">For inquiries, correspondence, and the usual human forms of contact.</p>
            </article>
            <article class="contact-item">
              <div class="contact-item__icon"><i class="fa-regular fa-paper-plane"></i></div>
              <div class="contact-item__main">
                <h3 class="contact-item__title"><a href="#newsletter">Newsletter</a></h3>
                <div class="contact-item__meta">Join the mailing list</div>
              </div>
              <p class="contact-item__excerpt">For new releases, updates, and anything that escapes the dark long enough to be announced.</p>
            </article>
            <article class="contact-item">
              <div class="contact-item__icon"><i class="fa-brands fa-goodreads-g"></i></div>
              <div class="contact-item__main">
                <h3 class="contact-item__title"><a href="https://www.goodreads.com/" target="_blank" rel="noopener noreferrer">Goodreads</a></h3>
                <div class="contact-item__meta">Books and shelves</div>
              </div>
              <p class="contact-item__excerpt">Proof that the dread is at least well read.</p>
            </article>
            <article class="contact-item">
              <div class="contact-item__icon"><i class="fa-regular fa-chess-knight"></i></div>
              <div class="contact-item__main">
                <h3 class="contact-item__title"><a href="https://www.chess.com/" target="_blank" rel="noopener noreferrer">Chess.com</a></h3>
                <div class="contact-item__meta">Play and puzzles</div>
              </div>
              <p class="contact-item__excerpt">Find out whether the writer of dread is any good at the game of it.</p>
            </article>
          </div>
        `
      }
    };

    async function fetchStoriesIndex() {
      try {
        const response = await fetch('stories/stories.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('No stories index');
        const data = await response.json();
        return Array.isArray(data) ? data : (Array.isArray(data.stories) ? data.stories : []);
      } catch {
        return [];
      }
    }

    function setActiveNav(name = 'home') {
      document.querySelectorAll('.nav__link').forEach(link => link.classList.remove('is-active'));

      if (name === 'home') {
        homeLink?.classList.add('is-active');
      } else if (name === 'story') {
        return;
      } else {
        const active = document.querySelector(`[data-section="${name}"]`);
        if (active) active.classList.add('is-active');
      }
    }

    function showHomeView() {
      clearBrandScrollWatcher();
      currentStoryTitle = '';
      setBrandText('KP');
      dynamicSection.style.display = 'none';
      dynamicSection.innerHTML = '';
      controlsSection.style.display = '';
      storiesSection.style.display = '';
      setActiveNav('home');
      pageEl.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function pushAppState(state, hash = '') {
      const url = `${window.location.pathname}${window.location.search}${hash}`;
      window.history.pushState(state, '', url);
    }

    function replaceAppState(state, hash = '') {
      const url = `${window.location.pathname}${window.location.search}${hash}`;
      window.history.replaceState(state, '', url);
    }

    async function loadStory(slug, fallbackFile, pushState = false) {
      let file = fallbackFile;
      try {
        const storiesIndex = await fetchStoriesIndex();
        const match = storiesIndex.find(item => item.slug === slug || slugify(item.title || '') === slug);
        if (match && match.file) file = `stories/${match.file}`;
      } catch {}

      try {
        const res = await fetch(file, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load story');
        const text = await res.text();

        const story = postsData.find(post => slugify(post.title) === slug);
        currentStoryTitle = story ? story.title : 'Story';

        dynamicSection.style.display = 'block';
        dynamicSection.innerHTML = `<div class="md-content">${marked.parse(text)}</div>`;
        controlsSection.style.display = 'none';
        storiesSection.style.display = 'none';
        setActiveNav('story');
        setBrandText('KP');
        pageEl.scrollTo({ top: 0, behavior: 'smooth' });

        requestAnimationFrame(() => {
          setupStoryBrandWatcher();
        });

        if (pushState) {
          pushAppState({ view: 'story', slug, file }, `#story-${slug}`);
        }
      } catch {
        clearBrandScrollWatcher();
        currentStoryTitle = '';
        setBrandText('KP');
        dynamicSection.style.display = 'block';
        dynamicSection.innerHTML = `<p>Unable to load story.</p>`;
        controlsSection.style.display = 'none';
        storiesSection.style.display = 'none';
        setActiveNav('story');
      }
    }

    function openSection(name, pushState = false) {
      const section = sectionContent[name];
      if (!section) return;

      clearBrandScrollWatcher();
      currentStoryTitle = '';
      setBrandText('KP');

      dynamicSection.style.display = 'block';
      dynamicSection.innerHTML = section.showTitle === false ? section.body : `<strong>${section.title}</strong>${section.body}`;
      controlsSection.style.display = 'none';
      storiesSection.style.display = 'none';
      setActiveNav(name);
      pageEl.scrollTo({ top: 0, behavior: 'smooth' });

      if (pushState) {
        pushAppState({ view: 'section', section: name }, `#${name}`);
      }
    }

    function activateHome(pushState = false) {
      showHomeView();
      if (pushState) {
        pushAppState({ view: 'home' }, '#home');
      }
    }

    function setView(mode) {
      postsEl.classList.toggle('view-cards', mode === 'cards');
      postsEl.classList.toggle('view-rows', mode === 'rows');
      cardsViewBtn.classList.toggle('is-active', mode === 'cards');
      rowsViewBtn.classList.toggle('is-active', mode === 'rows');
      localStorage.setItem('kp-view', mode);
      refreshPosts();
    }

    function setTheme(theme) {
      document.body.classList.toggle('light', theme === 'light');
      localStorage.setItem('kp-theme', theme);
    }

    async function applyHistoryState(state) {
      if (!state || state.view === 'home') {
        showHomeView();
        return;
      }

      if (state.view === 'section' && state.section) {
        openSection(state.section, false);
        return;
      }

      if (state.view === 'story' && state.slug && state.file) {
        await loadStory(state.slug, state.file, false);
        return;
      }

      showHomeView();
    }

    searchInput.addEventListener('input', refreshPosts);

    sectionLinks.forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        openSection(link.dataset.section, true);
      });
    });

    homeLink.addEventListener('click', (event) => {
      event.preventDefault();
      activateHome(true);
      homeAnchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    brandHome.addEventListener('click', (event) => {
      event.preventDefault();
      activateHome(true);
      homeAnchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    cardsViewBtn.addEventListener('click', () => setView('cards'));
    rowsViewBtn.addEventListener('click', () => setView('rows'));
    modeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('light') ? 'dark' : 'light';
      setTheme(next);
    });

    window.addEventListener('popstate', async (event) => {
      await applyHistoryState(event.state);
    });

    const storedTheme = localStorage.getItem('kp-theme');
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    setTheme(storedTheme || (prefersLight ? 'light' : 'dark'));
    setView(localStorage.getItem('kp-view') || 'cards');

    replaceAppState({ view: 'home' }, '#home');
    showHomeView();
  </script>
</body>
</html>
