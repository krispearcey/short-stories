<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kristopher Pearcey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #191919;
      --surface: #f9f9f9;
      --text: #f2f2ef;
      --muted: #808086;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.11);
      --cta-bg: #f9f9f9;
      --cta-text: #191919;
      --hero-overlay: linear-gradient(180deg, rgba(8,8,10,0.10), rgba(8,8,10,0.42));
      --content-width: 642px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --fast: 180ms;
      --medium: 260ms;
      --nav-pill: rgba(255,255,255,0.045);
      --subscribe-bg: #f2f2ef;
      --subscribe-text: #191919;
      --hover-bright: #f3f3f2;
      --newsletter-box: rgba(255,255,255,0.03);
      --newsletter-input-bg: rgba(0,0,0,0.22);
      --newsletter-flash: rgba(255,255,255,0.09);
    }

    body.light {
      --bg: #f6f6f3;
      --surface: #191919;
      --text: #1a1a1a;
      --muted: #76767b;
      --line: rgba(0,0,0,0.085);
      --line-strong: rgba(0,0,0,0.13);
      --cta-bg: #191919;
      --cta-text: #f9f9f9;
      --hero-overlay: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.28));
      --nav-pill: rgba(0,0,0,0.055);
      --subscribe-bg: #191919;
      --subscribe-text: #f2f2ef;
      --hover-bright: #0f1012;
      --newsletter-box: rgba(0,0,0,0.04);
      --newsletter-input-bg: rgba(255, 255, 252, 0.5);
      --newsletter-flash: rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      height: 100%;
    }

    html, body { overflow: hidden; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background var(--medium) var(--ease), color var(--medium) var(--ease);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 16px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24;
    }

    .view-toggle .material-symbols-outlined.flip-horizontal {
      transform: scaleX(-1);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      height: 38px;
      background: var(--cta-bg);
      color: var(--cta-text);
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background var(--medium) var(--ease), color var(--medium) var(--ease);
    }

    body.light .topbar {
      border-bottom-color: rgba(255,255,255,0.05);
    }

    .topbar__inner {
      max-width: 1240px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
    }

    .topbar__cta {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
      white-space: nowrap;
    }

    .topbar__cta svg {
      width: 13px;
      height: 13px;
    }

    .topbar__cta:hover {
      opacity: 0.9;
      text-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    body.light .topbar__cta:hover {
      text-shadow: 0 0 10px rgba(255,255,255,0.06);
    }

    .page {
      height: calc(100vh - 38px);
      padding-top: 0;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
    }

    .page::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .shell {
      width: min(var(--content-width), calc(100vw - 48px));
      margin: 0 auto;
      padding-top: 0;
      padding-bottom: 24px;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 0 -12px;
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 60px;
      padding: 0 12px;
      box-sizing: border-box;
      background: color-mix(in srgb, var(--bg) 9%, transparent);
      isolation: isolate;
    }

    .nav::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 20px;
      pointer-events: none;
      background: linear-gradient(to bottom, color-mix(in srgb, var(--bg) 16%, transparent) 0%, transparent 100%);
    }

    .brand {
      font-size: 16px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.035em;
      color: var(--muted);
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
      flex: 0 0 auto;
      max-width: 42vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand:hover {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.05);
    }

    body.light .brand:hover {
      text-shadow: 0 0 10px rgba(25,25,25,0.04);
    }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav__link,
    .nav__subscribe,
    .mode-toggle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
      background: none;
      border: 0;
      padding: 0;
      cursor: pointer;
      transition:
        color var(--fast) var(--ease),
        opacity var(--fast) var(--ease),
        text-shadow var(--fast) var(--ease),
        background var(--fast) var(--ease);
    }

    .nav__link,
    .nav__subscribe {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 11px;
      border-radius: 9px;
    }

    .nav__link:hover,
    .mode-toggle:hover,
    .nav__link.is-active {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.06);
    }

    .nav__link.is-active {
      background: var(--nav-pill);
    }

    .nav__subscribe {
      background: var(--subscribe-bg);
      color: var(--subscribe-text);
    }

    .nav__subscribe:hover {
      opacity: 0.92;
      text-shadow: none;
    }

    body.light .nav__link:hover,
    body.light .mode-toggle:hover,
    body.light .nav__link.is-active {
      text-shadow: 0 0 10px rgba(25,25,25,0.05);
    }

    .mode-toggle {
      width: 16px;
      height: 16px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 4px;
      flex: 0 0 auto;
    }

    .mode-toggle svg {
      position: absolute;
      width: 14px;
      height: 14px;
      transition: opacity var(--medium) var(--ease), transform var(--medium) var(--ease);
    }

    .mode-toggle .sun { opacity: 1; transform: rotate(0deg) scale(1); }
    .mode-toggle .moon { opacity: 0; transform: rotate(25deg) scale(0.82); }
    body.light .mode-toggle .sun { opacity: 0; transform: rotate(-25deg) scale(0.82); }
    body.light .mode-toggle .moon { opacity: 1; transform: rotate(0deg) scale(1); }

    .hero {
      position: relative;
      height: 246px;
      margin: 0 -12px 30px;
      overflow: hidden;
      border-radius: 2px;
    }

    .hero__media,
    .hero__media::after,
    .hero__image {
      position: absolute;
      inset: 0;
    }

    .hero__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--bg);
      filter: saturate(0.9) contrast(0.98) brightness(0.84);
    }

    body.light .hero__image {
      filter: saturate(0.92) contrast(0.98) brightness(1.03);
    }

    .hero__media::after {
      content: "";
      background: var(--hero-overlay);
    }

    .hero__content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 6px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(31px, 4vw, 44px);
      line-height: 0.96;
      letter-spacing: -0.066em;
      font-weight: 800;
      color: #f3f3f2;
      max-width: 8.7ch;
      text-wrap: balance;
      text-shadow: 0 1px 1px rgba(0,0,0,0.18);
    }

    body.light .hero h1 {
      color: #0f1012;
      text-shadow: none;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .search {
      position: relative;
      flex: 1 1 auto;
      max-width: 210px;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 0;
      width: 16px;
      height: 16px;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 28px;
      padding: 0 22px 0 28px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .search input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .search input[type="search"]::-webkit-search-decoration,
    .search input[type="search"]::-webkit-search-results-button,
    .search input[type="search"]::-webkit-search-results-decoration {
      display: none;
    }

    .search input[type="search"]::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      margin-left: 8px;
      cursor: pointer;
      background-color: var(--muted);
      opacity: 1;
      -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.7' stroke-linecap='round'><path d='M4 4l8 8'/><path d='M12 4L4 12'/></svg>");
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: 14px 14px;
      mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.7' stroke-linecap='round'><path d='M4 4l8 8'/><path d='M12 4L4 12'/></svg>");
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: 14px 14px;
    }

    .search input[type="search"]::-webkit-search-cancel-button:hover {
      background-color: var(--text);
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex: 0 0 auto;
    }

    .view-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: 0;
      padding: 0;
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease), text-shadow var(--fast) var(--ease);
    }

    .view-toggle button:hover,
    .view-toggle button.is-active {
      color: var(--text);
      text-shadow: 0 0 10px rgba(249,249,249,0.06);
    }

    body.light .view-toggle button:hover,
    body.light .view-toggle button.is-active {
      text-shadow: 0 0 10px rgba(25,25,25,0.05);
    }

    .view-toggle svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .view-toggle .material-symbols-outlined {
      font-size: 16px;
    }

    .posts {
      display: grid;
      gap: 0;
    }

    .post {
      position: relative;
      transition:
        background var(--medium) var(--ease),
        opacity var(--medium) var(--ease),
        color var(--medium) var(--ease);
      border-radius: 0;
      padding-left: 12px !important;
      padding-right: 12px !important;
      margin-left: -12px;
      margin-right: -12px;
    }

    .posts.view-cards .post {
      cursor: pointer;
      display: block;
      padding-top: 17px;
      padding-bottom: 17px;
    }

    .posts.view-cards .post + .post {
      border-top: 1px solid var(--line);
      padding-top: 19px;
    }

    .posts.view-rows .post {
      cursor: pointer;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 72px;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
      padding-bottom: 12px;
      border-top: 1px solid var(--line);
    }

    .posts.view-rows .post:first-child {
      border-top: 0;
    }

    .post:hover {
      background: color-mix(in srgb, var(--text) 4%, transparent);
    }

    .post__title {
      margin: 0;
      color: color-mix(in srgb, var(--text) 78%, var(--muted) 22%);
      letter-spacing: -0.035em;
      transition: color var(--medium) var(--ease), opacity var(--fast) var(--ease);
    }

    .posts.view-cards .post__title {
      font-size: 17px;
      line-height: 1.14;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .posts.view-rows .post__title {
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
    }

    .post__meta {
      color: var(--muted);
      letter-spacing: -0.02em;
      transition: color var(--medium) var(--ease);
    }

    .posts.view-cards .post__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 5px;
      font-size: 13px;
      line-height: 1.28;
      font-weight: 500;
    }

    .posts.view-rows .post__meta {
      display: contents;
    }

    .post__year,
    .post__pages {
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: -0.02em;
      transition: color var(--medium) var(--ease);
    }

    .post__year { justify-self: start; }

    .post__pages {
      justify-self: end;
      text-align: right;
      white-space: nowrap;
    }

    .post__excerpt {
      margin: 0;
      color: var(--muted);
      letter-spacing: -0.02em;
      transition: color var(--medium) var(--ease);
    }

    .posts.view-cards .post__excerpt {
      font-size: 15px;
      line-height: 1.58;
      max-width: none;
      margin: 0;
      padding: 0;
    }

    .post:hover .post__title,
    .post:hover .post__meta,
    .post:hover .post__excerpt,
    .post:hover .post__year,
    .post:hover .post__pages {
      color: var(--hover-bright);
      opacity: 1;
    }

    .posts.view-rows .post__excerpt,
    .posts.view-rows .post__icon,
    .posts.view-rows .post__metaDot,
    .posts.view-rows .post__author,
    .posts.view-rows .post__formattedDate,
    .posts.view-rows .post__monthYear,
    .posts.view-rows .post__shortdate {
      display: none;
    }

    .empty {
      display: none;
      padding-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      letter-spacing: -0.02em;
    }

    .empty.is-visible { display: block; }

    .plain-block {
      color: #88888d;
      font-size: 15px;
      line-height: 1.72;
      letter-spacing: -0.02em;
    }

    .plain-block strong {
      display: block;
      margin-top: 10px;
      margin-bottom: 18px;
      font-size: 17px;
      line-height: 1.18;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.035em;
    }

	.md-content h1,
	.md-content h2,
	.md-content h3,
	.md-content h4,
	.md-content h5,
	.md-content h6 {
	  color: color-mix(in srgb, var(--text) 78%, var(--muted) 22%);
	  letter-spacing: -0.035em;
	  font-weight: 700;
	}

    .contact-links {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      letter-spacing: -0.02em;
      transition: color var(--fast) var(--ease), opacity var(--fast) var(--ease);
    }

    .contact-link i {
      width: 16px;
      text-align: center;
      flex: 0 0 16px;
    }

    .contact-link:hover {
      color: var(--text);
    }

    .newsletter {
      margin-top: 34px;
      padding: 0;
    }

    .newsletter__inner {
      padding: 22px 20px;
      margin-left: -12px;
      margin-right: -12px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--newsletter-box) 82%, transparent);
      min-height: 148px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition:
        background var(--medium) var(--ease),
        box-shadow var(--medium) var(--ease),
        transform var(--medium) var(--ease);
    }

    .newsletter__inner.is-flashing {
      animation: newsletterFlash 900ms var(--ease);
    }

    @keyframes newsletterFlash {
      0% {
        background: color-mix(in srgb, var(--newsletter-box) 82%, transparent);
        box-shadow: 0 0 0 rgba(0,0,0,0);
      }
      28% {
        background: color-mix(in srgb, var(--newsletter-box) 55%, var(--newsletter-flash) 45%);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--newsletter-flash) 48%, transparent);
      }
      100% {
        background: color-mix(in srgb, var(--newsletter-box) 82%, transparent);
        box-shadow: 0 0 0 rgba(0,0,0,0);
      }
    }

    .newsletter__header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .newsletter__title {
      margin: 0;
      color: color-mix(in srgb, var(--text) 78%, var(--muted) 22%);
      font-size: 17px;
      line-height: 1.14;
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    .newsletter__count {
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--muted);
      white-space: nowrap;
    }

    .newsletter__form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .newsletter__input {
      width: 100%;
      min-width: 0;
      height: 32px;
      padding: 0 11px;
      border: 0;
      outline: none;
      border-radius: 9px;
      background: var(--newsletter-input-bg);
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
      transition:
        background var(--medium) var(--ease),
        color var(--medium) var(--ease),
        opacity var(--medium) var(--ease);
    }

    .newsletter__input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    .newsletter__input:disabled {
      cursor: default;
      opacity: 0.7;
      background: color-mix(in srgb, var(--newsletter-input-bg) 82%, var(--newsletter-box) 18%);
      color: color-mix(in srgb, var(--muted) 85%, var(--text) 15%);
    }

    .newsletter__button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      height: 28px;
      width: 104px;
      min-width: 104px;
      padding: 0 11px;
      border: 0;
      border-radius: 9px;
      background: var(--subscribe-bg);
      color: var(--subscribe-text);
      font-size: 14px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition:
        opacity var(--fast) var(--ease),
        background var(--medium) var(--ease),
        color var(--medium) var(--ease);
      white-space: nowrap;
      overflow: hidden;
      flex: 0 0 104px;
    }

    .newsletter__button:hover {
      opacity: 0.92;
    }

    .newsletter__button.is-success {
      background: var(--newsletter-box);
      color: var(--subscribe-bg);
      cursor: default;
      opacity: 1;
    }

    .newsletter__button:disabled {
      cursor: default;
      opacity: 1;
    }

    .newsletter__buttonLabel,
    .newsletter__buttonSpinner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition:
        opacity var(--fast) var(--ease),
        transform var(--fast) var(--ease);
    }

    .newsletter__buttonSpinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1.7px solid color-mix(in srgb, currentColor 28%, transparent);
      border-top-color: currentColor;
      opacity: 0;
      pointer-events: none;
    }

    .newsletter__button.is-loading .newsletter__buttonLabel {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.9);
    }

    .newsletter__button.is-loading .newsletter__buttonSpinner {
      opacity: 1;
      animation: newsletterSpin 650ms linear infinite;
    }

    @keyframes newsletterSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .newsletter__copy {
      margin: 0;
      max-width: 42ch;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.58;
      letter-spacing: -0.02em;
    }

    .footer {
      margin-top: auto;
      padding-top: 34px;
      padding-bottom: 0;
    }

    .footer__inner {
      margin-left: -12px;
      margin-right: -12px;
      padding: 17px 12px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      color: color-mix(in srgb, var(--muted) 50%, transparent);
      font-size: 13px;
      line-height: 1.58;
      letter-spacing: -0.02em;
    }

    @media (max-width: 720px) {
      :root { --content-width: 642px; }

      .shell {
        width: min(var(--content-width), calc(100vw - 28px));
        padding-top: 0;
      }

      .nav {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 64px;
      }

      .nav__links {
        gap: 8px;
        flex-wrap: nowrap;
        justify-content: flex-end;
        min-width: 0;
      }

      .nav__link,
      .nav__subscribe,
      .mode-toggle {
        font-size: 15px;
      }

      .nav__link,
      .nav__subscribe {
        min-height: 30px;
        padding: 0 11px;
      }

      .mode-toggle {
        width: 18px;
        height: 18px;
        margin-left: 4px;
      }

      .mode-toggle svg {
        width: 16px;
        height: 16px;
      }

      .hero {
        height: 196px;
        margin-bottom: 26px;
      }

      .hero h1 {
        font-size: 30px;
        max-width: 8.9ch;
      }

      .controls {
        gap: 16px;
        align-items: center;
        margin-bottom: 16px;
      }

      .search {
        max-width: none;
        flex: 1 1 auto;
      }

      .search input {
        height: 32px;
        font-size: 16px;
        padding: 0 24px 0 30px;
      }

      .search svg {
        width: 17px;
        height: 17px;
      }

      .view-toggle {
        gap: 16px;
      }

      .view-toggle button {
        width: 20px;
        height: 20px;
      }

      .view-toggle svg {
        width: 18px;
        height: 18px;
      }

      .view-toggle .material-symbols-outlined {
        font-size: 19px;
      }

      .posts.view-rows .post {
        grid-template-columns: 42px minmax(0, 1fr) 62px;
      }

      .brand {
        max-width: 34vw;
      }

      .newsletter__inner {
        padding: 20px 18px;
        min-height: 142px;
      }
    }

    @media (max-width: 520px) {
      .topbar__cta { font-size: 11px; }

      .shell {
        width: calc(100vw - 22px);
      }

      .nav {
        gap: 10px;
        min-height: 62px;
      }

      .brand {
        font-size: 17px;
        max-width: 32vw;
      }

      .nav__links {
        gap: 7px;
      }

      .nav__link,
      .nav__subscribe,
      .mode-toggle {
        font-size: 15px;
      }

      .nav__link,
      .nav__subscribe {
        min-height: 30px;
        padding: 0 10px;
      }

      .mode-toggle {
        width: 18px;
        height: 18px;
      }

      .mode-toggle svg {
        width: 16px;
        height: 16px;
      }

      .controls {
        gap: 14px;
      }

      .search {
        max-width: none;
      }

      .view-toggle {
        gap: 14px;
      }

      .view-toggle button {
        width: 20px;
        height: 20px;
      }

      .posts.view-cards .post {
        padding-top: 15px;
        padding-bottom: 16px;
      }

      .posts.view-cards .post + .post {
        padding-top: 16px;
      }

      .posts.view-rows .post {
        grid-template-columns: 40px minmax(0, 1fr) 58px;
        gap: 8px;
      }

      .posts.view-cards .post__title,
      .posts.view-rows .post__title {
        font-size: 15px;
      }

      .posts.view-cards .post__excerpt {
        font-size: 14px;
        line-height: 1.56;
      }

      .post__pages {
        font-size: 12px;
      }

      .newsletter__inner {
        padding: 18px 16px;
        min-height: 136px;
      }

      .newsletter__header {
        gap: 10px;
        margin-bottom: 12px;
      }

      .newsletter__form {
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .newsletter__input {
        font-size: 15px;
      }

      .newsletter__button {
        width: 104px;
        min-width: 104px;
        flex-basis: 104px;
      }

      .newsletter__copy {
        font-size: 14px;
        line-height: 1.56;
        max-width: none;
      }
    }

    @media (hover: none), (pointer: coarse) {
      .topbar__cta,
      .brand,
      .nav__link,
      .nav__subscribe,
      .mode-toggle,
      .view-toggle button,
      .post,
      .post__title,
      .post__meta,
      .post__excerpt,
      .post__year,
      .post__pages,
      .contact-link,
      .newsletter__button {
        -webkit-tap-highlight-color: transparent;
        tap-highlight-color: transparent;
        text-shadow: none !important;
        user-select: none;
      }

      .post:hover {
        background: transparent;
      }

      .post:hover .post__title,
      .post:hover .post__meta,
      .post:hover .post__excerpt,
      .post:hover .post__year,
      .post:hover .post__pages,
      .post:active .post__title,
      .post:active .post__meta,
      .post:active .post__excerpt,
      .post:active .post__year,
      .post:active .post__pages {
        color: inherit !important;
        opacity: inherit !important;
      }

      .topbar__cta:hover,
      .topbar__cta:active,
      .brand:hover,
      .brand:active,
      .nav__link:hover,
      .nav__link:active,
      .nav__subscribe:hover,
      .nav__subscribe:active,
      .mode-toggle:hover,
      .mode-toggle:active,
      .view-toggle button:hover,
      .view-toggle button:active,
      .contact-link:hover,
      .contact-link:active,
      .newsletter__button:hover,
      .newsletter__button:active {
        color: inherit !important;
        opacity: inherit !important;
        text-shadow: none !important;
      }

      .search input,
      .search input[type="search"],
      .newsletter__input {
        font-size: 16px;
      }

      .search input[type="search"]::-webkit-search-cancel-button:hover {
        background-color: var(--muted);
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar__inner">
      <a href="#newsletter" class="topbar__cta" aria-label="Join the newsletter">
        <span>Join the Newsletter — Get Notified for New Content</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="m13 5 7 7-7 7"></path>
        </svg>
      </a>
    </div>
  </div>

  <div class="page" id="pageRoot">
    <div id="home"></div>
    <main class="shell">
      <header class="nav">
        <a href="#home" class="brand" id="brandHome" aria-label="KP home">KP</a>
        <nav class="nav__links" aria-label="Primary navigation">
          <a class="nav__link is-active" href="#home">Home</a>
          <a class="nav__link" href="#about" data-section="about">About</a>
          <a class="nav__subscribe" href="#newsletter">Subscribe</a>
          <button class="mode-toggle" id="modeToggle" type="button" aria-label="Toggle light and dark mode">
            <svg class="moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"></path>
            </svg>
            <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </nav>
      </header>

      <section class="hero" aria-label="Hero section">
        <div class="hero__media">
          <img class="hero__image" src="author.png" alt="Author portrait" />
        </div>
        <div class="hero__content">
          <h1>Short Horror from Atlantic Canada.</h1>
        </div>
      </section>

      <section class="controls" aria-label="Search and list controls">
        <label class="search" aria-label="Search titles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="Search..." autocomplete="off" />
        </label>

        <div class="view-toggle" aria-label="Change list layout">
          <button id="cardsViewBtn" class="is-active" type="button" aria-label="Expanded story list view">
            <span class="material-symbols-outlined flip-horizontal" aria-hidden="true">event_list</span>
          </button>
          <button id="rowsViewBtn" type="button" aria-label="Single line story list view">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M2 3.25H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2 8H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M2 12.75H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </section>

      <section id="dynamicSection" class="plain-block" style="display:none; margin-bottom: 18px;" aria-live="polite"></section>

      <section id="storiesSection" aria-label="Stories list">
        <div id="posts" class="posts view-cards"></div>
        <div id="emptyState" class="empty">No titles matched your search.</div>
      </section>

      <section id="newsletter" class="newsletter" aria-labelledby="newsletterTitle">
        <div class="newsletter__inner" id="newsletterInner">
          <div class="newsletter__header">
            <h2 class="newsletter__title" id="newsletterTitle">Looking for more?</h2>
            <div class="newsletter__count">10+ Readers</div>
          </div>

          <form class="newsletter__form" id="newsletterForm" novalidate>
            <input
              class="newsletter__input"
              id="newsletterInput"
              type="email"
              name="email"
              placeholder="your@email.com"
              aria-label="Email address"
              autocomplete="email"
              required
            />
            <button class="newsletter__button" id="newsletterButton" type="submit">
              <span class="newsletter__buttonLabel" id="newsletterButtonLabel">Subscribe</span>
              <span class="newsletter__buttonSpinner" aria-hidden="true"></span>
            </button>
          </form>

          <p class="newsletter__copy" id="newsletterCopy">Notifications only when new stories are posted.<br>No spam. No nonsense.</p>
        </div>
      </section>

      <footer class="footer" aria-label="Footer">
        <div class="footer__inner">© Kristopher Pearcey 2026</div>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const postsData = [
      {
        title: 'Quiet Places',
        author: 'Kristopher Pearcey',
        date: '2026-03-14',
        monthYear: 'Mar 2026',
        year: '2026',
        pages: 31,
        excerpt: 'A novel-length descent into familiar places that become strange the longer anyone looks at them.'
      },
      {
        title: 'The Long Hall',
        author: 'Kristopher Pearcey',
        date: '2026-02-22',
        monthYear: 'Feb 2026',
        year: '2026',
        pages: 18,
        excerpt: 'A corridor keeps extending in the corner of a family home, always just past where anyone remembers it ending.'
      },
      {
        title: 'Salt House',
        author: 'Kristopher Pearcey',
        date: '2026-01-30',
        monthYear: 'Jan 2026',
        year: '2026',
        pages: 14,
        excerpt: 'Wind, timber, and the sea begin answering each other after a winter power outage on the coast.'
      },
      {
        title: 'The Visitor Log',
        author: 'Kristopher Pearcey',
        date: '2025-12-18',
        monthYear: 'Dec 2025',
        year: '2025',
        pages: 11,
        excerpt: 'The names in a museum sign-in book start appearing before the visitors themselves do.'
      },
      {
        title: 'Blue Hour',
        author: 'Kristopher Pearcey',
        date: '2025-11-09',
        monthYear: 'Nov 2025',
        year: '2025',
        pages: 9,
        excerpt: 'A commuter sees the same bus stop at every turn of the road, no matter which route she takes home.'
      }
    ].sort((a, b) => new Date(b.date) - new Date(a.date));

    const postsEl = document.getElementById('posts');
    const emptyStateEl = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const cardsViewBtn = document.getElementById('cardsViewBtn');
    const rowsViewBtn = document.getElementById('rowsViewBtn');
    const modeToggle = document.getElementById('modeToggle');
    const dynamicSection = document.getElementById('dynamicSection');
    const storiesSection = document.getElementById('storiesSection');
    const controlsSection = document.querySelector('.controls');
    const sectionLinks = document.querySelectorAll('[data-section]');
    const brandHome = document.getElementById('brandHome');
    const homeAnchor = document.getElementById('home');
    const pageEl = document.querySelector('.page');
    const homeLink = document.querySelector('.nav__link[href="#home"]');
    const newsletterLinks = document.querySelectorAll('a[href="#newsletter"]');
    const newsletterEl = document.getElementById('newsletter');
    const newsletterInnerEl = document.getElementById('newsletterInner');
    const newsletterForm = document.getElementById('newsletterForm');
    const newsletterInput = document.getElementById('newsletterInput');
    const newsletterButton = document.getElementById('newsletterButton');
    const newsletterButtonLabel = document.getElementById('newsletterButtonLabel');

    let currentStoryTitle = '';
    let brandScrollHandler = null;
    let newsletterSubmitted = false;

    function slugify(title) {
      return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function setBrandText(text = 'KP') {
      brandHome.textContent = text;
      brandHome.setAttribute('aria-label', `${text} home`);
    }

    function clearBrandScrollWatcher() {
      if (brandScrollHandler) {
        pageEl.removeEventListener('scroll', brandScrollHandler);
        brandScrollHandler = null;
      }
    }

    function setupStoryBrandWatcher() {
      clearBrandScrollWatcher();

      const storyHeading = dynamicSection.querySelector('.md-content h1');
      if (!storyHeading || !currentStoryTitle) {
        setBrandText('KP');
        return;
      }

      const updateBrand = () => {
        const headingTop = storyHeading.getBoundingClientRect().top;
        const navBottom = document.querySelector('.nav').getBoundingClientRect().bottom;
        if (headingTop <= navBottom) {
          setBrandText(currentStoryTitle);
        } else {
          setBrandText('KP');
        }
      };

      brandScrollHandler = updateBrand;
      pageEl.addEventListener('scroll', brandScrollHandler, { passive: true });
      updateBrand();
    }

    function bindPostEvents() {
      document.querySelectorAll('.post').forEach((el) => {
        const open = () => loadStory(el.dataset.slug, el.dataset.file, true);
        el.addEventListener('click', open);
        el.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            open();
          }
        });
      });
    }

    function renderPosts(items) {
      const isRows = postsEl.classList.contains('view-rows');

      postsEl.innerHTML = items.map((post) => {
        const slug = slugify(post.title);
        const file = `stories/${slug}.md`;

        if (isRows) {
          return `
            <article class="post" data-slug="${slug}" data-file="${file}" role="button" tabindex="0">
              <div class="post__year">${post.year}</div>
              <h2 class="post__title">${post.title}</h2>
              <div class="post__pages">${post.pages} pages</div>
              <div class="post__meta">
                <span class="post__author">${post.author}</span>
                <span class="post__metaDot">•</span>
                <span class="post__formattedDate">${post.monthYear}</span>
              </div>
              <p class="post__excerpt">${post.excerpt}</p>
            </article>
          `;
        }

        return `
          <article class="post" data-slug="${slug}" data-file="${file}" role="button" tabindex="0">
            <h2 class="post__title">${post.title}</h2>
            <div class="post__meta">
              <span>${post.author}</span>
              <span class="post__metaDot">•</span>
              <span class="post__monthYear">${post.monthYear}</span>
              <span class="post__metaDot">•</span>
              <span>${post.pages} pages</span>
            </div>
            <p class="post__excerpt">${post.excerpt}</p>
          </article>
        `;
      }).join('');

      bindPostEvents();
      emptyStateEl.classList.toggle('is-visible', items.length === 0);
    }

    function getFilteredPosts() {
      const query = searchInput.value.trim().toLowerCase();
      return postsData.filter(post => post.title.toLowerCase().includes(query));
    }

    function refreshPosts() {
      renderPosts(getFilteredPosts());
    }

    const sectionContent = {
      about: {
        title: 'About',
        showTitle: true,
        body: `
          <p>Kristopher Pearcey is a horror writer from Atlantic Canada.
		  He's made no shortage of attempts at full length novels, but his ideas tend to grow faster than he can write them down. 
		  For now, he's put his energy into short stories, all of which you'll find here.</p>
		  <p>Kris has a habit of letting his hobbies and overactive imagination bleed together in his work. 
		  Most of what ends up on the page starts somewhere he frequents, and gets worse from there.</p>
		  <p>When he's not writing, he's probably outdoors fly fishing water he won't tell you about, or playing chess online. 
		  If you'd like to connect with Kris, you'll find him at the links below.</p>
          <div class="contact-links">
            <a class="contact-link" href="mailto:hello@example.com">
              <i class="fa-regular fa-envelope" aria-hidden="true"></i>
              <span>hello@example.com</span>
            </a>
            <a class="contact-link" href="https://www.goodreads.com/" target="_blank" rel="noopener noreferrer">
              <i class="fa-brands fa-goodreads-g" aria-hidden="true"></i>
              <span>Goodreads</span>
            </a>
            <a class="contact-link" href="https://www.chess.com/" target="_blank" rel="noopener noreferrer">
              <i class="fa-regular fa-chess-knight" aria-hidden="true"></i>
              <span>Chess.com</span>
            </a>
          </div>
        `
      }
    };

    async function fetchStoriesIndex() {
      try {
        const response = await fetch('stories/stories.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('No stories index');
        const data = await response.json();
        return Array.isArray(data) ? data : (Array.isArray(data.stories) ? data.stories : []);
      } catch {
        return [];
      }
    }

    function setActiveNav(name = 'home') {
      document.querySelectorAll('.nav__link').forEach(link => link.classList.remove('is-active'));

      if (name === 'home') {
        homeLink?.classList.add('is-active');
      } else if (name === 'story') {
        return;
      } else {
        const active = document.querySelector(`[data-section="${name}"]`);
        if (active) active.classList.add('is-active');
      }
    }

    function showHomeView(scrollToTop = true) {
      clearBrandScrollWatcher();
      currentStoryTitle = '';
      setBrandText('KP');
      dynamicSection.style.display = 'none';
      dynamicSection.innerHTML = '';
      controlsSection.style.display = '';
      storiesSection.style.display = '';
      newsletterEl.style.display = '';
      setActiveNav('home');

      if (scrollToTop) {
        pageEl.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function pushAppState(state, hash = '') {
      const url = `${window.location.pathname}${window.location.search}${hash}`;
      window.history.pushState(state, '', url);
    }

    function replaceAppState(state, hash = '') {
      const url = `${window.location.pathname}${window.location.search}${hash}`;
      window.history.replaceState(state, '', url);
    }

    async function loadStory(slug, fallbackFile, pushState = false) {
      let file = fallbackFile;
      try {
        const storiesIndex = await fetchStoriesIndex();
        const match = storiesIndex.find(item => item.slug === slug || slugify(item.title || '') === slug);
        if (match && match.file) file = `stories/${match.file}`;
      } catch {}

      try {
        const res = await fetch(file, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load story');
        const text = await res.text();

        const story = postsData.find(post => slugify(post.title) === slug);
        currentStoryTitle = story ? story.title : 'Story';

        dynamicSection.style.display = 'block';
        dynamicSection.innerHTML = `<div class="md-content">${marked.parse(text)}</div>`;
        controlsSection.style.display = 'none';
        storiesSection.style.display = 'none';
        newsletterEl.style.display = 'none';
        setActiveNav('story');
        setBrandText('KP');
        pageEl.scrollTo({ top: 0, behavior: 'smooth' });

        requestAnimationFrame(() => {
          setupStoryBrandWatcher();
        });

        if (pushState) {
          pushAppState({ view: 'story', slug, file }, `#story-${slug}`);
        }
      } catch {
        clearBrandScrollWatcher();
        currentStoryTitle = '';
        setBrandText('KP');
        dynamicSection.style.display = 'block';
        dynamicSection.innerHTML = `<p>Unable to load story.</p>`;
        controlsSection.style.display = 'none';
        storiesSection.style.display = 'none';
        newsletterEl.style.display = 'none';
        setActiveNav('story');
      }
    }

    function openSection(name, pushState = false) {
      const section = sectionContent[name];
      if (!section) return;

      clearBrandScrollWatcher();
      currentStoryTitle = '';
      setBrandText('KP');

      dynamicSection.style.display = 'block';
      dynamicSection.innerHTML = section.showTitle === false ? section.body : `<strong>${section.title}</strong>${section.body}`;
      controlsSection.style.display = 'none';
      storiesSection.style.display = 'none';
      newsletterEl.style.display = 'none';
      setActiveNav(name);
      pageEl.scrollTo({ top: 0, behavior: 'smooth' });

      if (pushState) {
        pushAppState({ view: 'section', section: name }, `#${name}`);
      }
    }

    function activateHome(pushState = false) {
      showHomeView();
      if (pushState) {
        pushAppState({ view: 'home' }, '#home');
      }
    }

    function flashNewsletterBox() {
      if (!newsletterInnerEl) return;
      newsletterInnerEl.classList.remove('is-flashing');
      void newsletterInnerEl.offsetWidth;
      newsletterInnerEl.classList.add('is-flashing');
    }

    function scrollToNewsletter(withFlash = false) {
      if (!newsletterEl) return;

      newsletterEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      if (withFlash) {
        window.setTimeout(() => {
          flashNewsletterBox();
        }, 420);
      }
    }

    function handleNewsletterNavigation() {
      if (dynamicSection.style.display === 'block' || controlsSection.style.display === 'none' || storiesSection.style.display === 'none' || newsletterEl.style.display === 'none') {
        showHomeView(false);
        replaceAppState({ view: 'home' }, '#newsletter');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            scrollToNewsletter(true);
          });
        });
        return;
      }

      replaceAppState({ view: 'home' }, '#newsletter');
      scrollToNewsletter(true);
    }

    async function handleNewsletterSubmit(event) {
      event.preventDefault();

      if (newsletterSubmitted || !newsletterInput || !newsletterButton || !newsletterButtonLabel) return;

      const email = newsletterInput.value.trim();
      if (!email || !newsletterInput.checkValidity()) {
        newsletterInput.reportValidity();
        return;
      }

      newsletterButton.classList.add('is-loading');
      newsletterButton.disabled = true;

      await new Promise(resolve => window.setTimeout(resolve, 700));

      newsletterSubmitted = true;
      newsletterInput.value = email;
      newsletterInput.disabled = true;
      newsletterButton.classList.remove('is-loading');
      newsletterButton.classList.add('is-success');
      newsletterButtonLabel.textContent = 'Thank you!';
      newsletterButton.setAttribute('aria-label', 'Thank you!');
    }

    function setView(mode) {
      postsEl.classList.toggle('view-cards', mode === 'cards');
      postsEl.classList.toggle('view-rows', mode === 'rows');
      cardsViewBtn.classList.toggle('is-active', mode === 'cards');
      rowsViewBtn.classList.toggle('is-active', mode === 'rows');
      localStorage.setItem('kp-view', mode);
      refreshPosts();
    }

    function setTheme(theme) {
      document.body.classList.toggle('light', theme === 'light');
      localStorage.setItem('kp-theme', theme);
    }

    async function applyHistoryState(state) {
      if (!state || state.view === 'home') {
        showHomeView();
        return;
      }

      if (state.view === 'section' && state.section) {
        openSection(state.section, false);
        return;
      }

      if (state.view === 'story' && state.slug && state.file) {
        await loadStory(state.slug, state.file, false);
        return;
      }

      showHomeView();
    }

    searchInput.addEventListener('input', refreshPosts);

    sectionLinks.forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        openSection(link.dataset.section, true);
      });
    });

    newsletterLinks.forEach(link => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        handleNewsletterNavigation();
      });
    });

    newsletterForm.addEventListener('submit', handleNewsletterSubmit);

    homeLink.addEventListener('click', (event) => {
      event.preventDefault();
      activateHome(true);
      homeAnchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    brandHome.addEventListener('click', (event) => {
      event.preventDefault();
      activateHome(true);
      homeAnchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    cardsViewBtn.addEventListener('click', () => setView('cards'));
    rowsViewBtn.addEventListener('click', () => setView('rows'));
    modeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('light') ? 'dark' : 'light';
      setTheme(next);
    });

    window.addEventListener('popstate', async (event) => {
      await applyHistoryState(event.state);
    });

    const storedTheme = localStorage.getItem('kp-theme');
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    setTheme(storedTheme || (prefersLight ? 'light' : 'dark'));
    setView(localStorage.getItem('kp-view') || 'cards');

    replaceAppState({ view: 'home' }, '#home');
    showHomeView();
  </script>
</body>
</html>
